name: Fetch FRED Data

on:
  schedule:
    - cron: '0 6 * * *'   # 每天 UTC 06:00 自動執行
  workflow_dispatch:        # 允許手動觸發

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  fetch-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all series from FRED API
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          mkdir -p data
          START_DATE="2000-01-01"
          SERIES="DGS10 HOUST M2SL A191RL1Q225SBEA INDPRO PAYEMS RSAFS UNRATE CPIAUCSL FEDFUNDS"
          for ID in $SERIES; do
            echo "Fetching $ID..."
            curl -sf "https://api.stlouisfed.org/fred/series/observations?series_id=${ID}&api_key=${FRED_API_KEY}&file_type=json&observation_start=${START_DATE}&sort_order=asc" \
              -o "data/${ID}.json"
            sleep 0.6
          done
          echo "{\"fetched_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update FRED data $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
